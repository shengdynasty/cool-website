name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      # Deploy to sheng-yan.com (cool-website repo)
      - name: Deploy to sheng-yan.com
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com

      # Swap CNAME and deploy to shawnyan-com repo
      - name: Swap CNAME for shawnyan.com
        run: echo "shawnyan.com" > dist/CNAME

      - name: Deploy to shawnyan.com
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          repository-name: shengdynasty/shawnyan-com
          token: ${{ secrets.GH_TOKEN }}
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
