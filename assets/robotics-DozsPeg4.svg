<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a1e"/>
      <stop offset="100%" stop-color="#141814"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#243024"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>

  <!-- Competition field floor -->
  <rect x="0" y="310" width="800" height="140" fill="url(#floorGrad)"/>
  <rect x="0" y="306" width="800" height="6" fill="#141414"/>

  <!-- Field tape markings -->
  <line x1="0" y1="340" x2="800" y2="340" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="400" y1="310" x2="400" y2="450" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="100" y="325" width="180" height="100" rx="2" fill="none" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="520" y="325" width="180" height="100" rx="2" fill="none" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Background: code editor panel left -->
  <rect x="0" y="0" width="290" height="310" fill="#0d1008" stroke-width="0"/>
  <rect x="0" y="0" width="290" height="32" fill="#111a0a"/>
  <text x="16" y="22" font-family="monospace" font-size="11" fill="#4ade80" opacity="0.8">autonomous.py</text>
  <circle cx="272" cy="16" r="5" fill="#4ade80" opacity="0.5"/>

  <!-- Code lines -->
  <text x="16" y="54" font-family="monospace" font-size="9" fill="#2a4a2a">01</text>
  <text x="36" y="54" font-family="monospace" font-size="9" fill="#818cf8">def</text>
  <text x="64" y="54" font-family="monospace" font-size="9" fill="#4ade80"> drive_straight</text>
  <text x="180" y="54" font-family="monospace" font-size="9" fill="#e0e0e0">(speed, dist):</text>

  <text x="16" y="70" font-family="monospace" font-size="9" fill="#2a4a2a">02</text>
  <text x="36" y="70" font-family="monospace" font-size="9" fill="#555">    encoder = 0</text>

  <text x="16" y="86" font-family="monospace" font-size="9" fill="#2a4a2a">03</text>
  <text x="36" y="86" font-family="monospace" font-size="9" fill="#818cf8">    while</text>
  <text x="84" y="86" font-family="monospace" font-size="9" fill="#e0e0e0"> encoder &lt; dist:</text>

  <text x="16" y="102" font-family="monospace" font-size="9" fill="#2a4a2a">04</text>
  <text x="36" y="102" font-family="monospace" font-size="9" fill="#555">        motors.set(speed)</text>

  <text x="16" y="118" font-family="monospace" font-size="9" fill="#2a4a2a">05</text>
  <text x="36" y="118" font-family="monospace" font-size="9" fill="#555">        encoder += get_enc()</text>

  <text x="16" y="134" font-family="monospace" font-size="9" fill="#2a4a2a">06</text>
  <text x="36" y="134" font-family="monospace" font-size="9" fill="#555">    motors.stop()</text>

  <text x="16" y="158" font-family="monospace" font-size="9" fill="#2a4a2a">08</text>
  <text x="36" y="158" font-family="monospace" font-size="9" fill="#818cf8">def</text>
  <text x="64" y="158" font-family="monospace" font-size="9" fill="#4ade80"> pid_turn</text>
  <text x="130" y="158" font-family="monospace" font-size="9" fill="#e0e0e0">(target_deg):</text>

  <text x="16" y="174" font-family="monospace" font-size="9" fill="#2a4a2a">09</text>
  <text x="36" y="174" font-family="monospace" font-size="9" fill="#555">    Kp, Ki, Kd = 0.8, 0.02, 0.3</text>

  <text x="16" y="190" font-family="monospace" font-size="9" fill="#2a4a2a">10</text>
  <text x="36" y="190" font-family="monospace" font-size="9" fill="#555">    error = target_deg - gyro()</text>

  <text x="16" y="206" font-family="monospace" font-size="9" fill="#2a4a2a">11</text>
  <text x="36" y="206" font-family="monospace" font-size="9" fill="#555">    correction = Kp*error +</text>

  <text x="16" y="222" font-family="monospace" font-size="9" fill="#2a4a2a">12</text>
  <text x="36" y="222" font-family="monospace" font-size="9" fill="#555">        Ki*integral + Kd*deriv</text>

  <!-- Cursor blink line -->
  <rect x="36" y="246" width="6" height="10" fill="#4ade80" opacity="0.8"/>
  <text x="16" y="254" font-family="monospace" font-size="9" fill="#2a4a2a">15</text>

  <!-- Sensor data panel right side -->
  <rect x="510" y="0" width="290" height="310" fill="#080e14"/>
  <rect x="510" y="0" width="290" height="32" fill="#0d1520"/>
  <text x="526" y="22" font-family="monospace" font-size="11" fill="#4ade80" opacity="0.8">sensor_feed.log</text>

  <!-- Sensor readouts -->
  <text x="526" y="54" font-family="monospace" font-size="9" fill="#555">GYRO</text>
  <text x="780" y="54" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="end">+047.3°</text>
  <rect x="526" y="60" width="240" height="4" rx="2" fill="#0d1a0d"/>
  <rect x="526" y="60" width="140" height="4" rx="2" fill="#4ade80" opacity="0.5"/>

  <text x="526" y="84" font-family="monospace" font-size="9" fill="#555">ENCODER L</text>
  <text x="780" y="84" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="end">1,482 cts</text>

  <text x="526" y="104" font-family="monospace" font-size="9" fill="#555">ENCODER R</text>
  <text x="780" y="104" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="end">1,479 cts</text>

  <text x="526" y="124" font-family="monospace" font-size="9" fill="#555">ULTRASONIC</text>
  <text x="780" y="124" font-family="monospace" font-size="10" fill="#fb923c" text-anchor="end">14.2 cm</text>
  <rect x="526" y="130" width="240" height="4" rx="2" fill="#1a0e00"/>
  <rect x="526" y="130" width="40" height="4" rx="2" fill="#fb923c" opacity="0.6"/>

  <text x="526" y="150" font-family="monospace" font-size="9" fill="#555">BATTERY</text>
  <text x="780" y="150" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="end">87%</text>
  <rect x="526" y="156" width="240" height="4" rx="2" fill="#0d1a0d"/>
  <rect x="526" y="156" width="209" height="4" rx="2" fill="#4ade80" opacity="0.5"/>

  <line x1="526" y1="170" x2="782" y2="170" stroke="#0e1520" stroke-width="1"/>

  <!-- Autonomous path preview -->
  <text x="526" y="186" font-family="monospace" font-size="9" fill="#555">AUTO PATH PREVIEW</text>
  <rect x="526" y="194" width="254" height="100" rx="2" fill="#060c10"/>
  <!-- Field outline in preview -->
  <rect x="534" y="200" width="238" height="88" rx="1" fill="none" stroke="#0e1a20" stroke-width="1"/>
  <!-- Robot start -->
  <rect x="544" y="258" width="12" height="12" rx="1" fill="#4ade80" opacity="0.7"/>
  <!-- Path arrows -->
  <polyline points="550,258 550,230 600,230 600,210 680,210 680,240 740,240" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Waypoints -->
  <circle cx="550" cy="230" r="2.5" fill="#818cf8" opacity="0.8"/>
  <circle cx="600" cy="210" r="2.5" fill="#818cf8" opacity="0.8"/>
  <circle cx="680" cy="240" r="2.5" fill="#818cf8" opacity="0.8"/>
  <!-- Target zone -->
  <rect x="728" y="228" width="24" height="22" rx="1" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- State machine log -->
  <text x="526" y="308" font-family="monospace" font-size="8" fill="#4ade80">● STATE: pid_turn(90)</text>

  <!-- === ROBOT (center) === -->
  <!-- Chassis base -->
  <rect x="306" y="248" width="188" height="68" rx="6" fill="url(#robotBody)" stroke="#2a3a2a" stroke-width="1.5"/>

  <!-- Wheels -->
  <ellipse cx="326" cy="318" rx="18" ry="10" fill="#141414" stroke="#222" stroke-width="1.5"/>
  <ellipse cx="326" cy="318" rx="10" ry="5" fill="#1a1a1a"/>
  <ellipse cx="474" cy="318" rx="18" ry="10" fill="#141414" stroke="#222" stroke-width="1.5"/>
  <ellipse cx="474" cy="318" rx="10" ry="5" fill="#1a1a1a"/>
  <ellipse cx="326" cy="252" rx="18" ry="10" fill="#141414" stroke="#222" stroke-width="1.5"/>
  <ellipse cx="326" cy="252" rx="10" ry="5" fill="#1a1a1a"/>
  <ellipse cx="474" cy="252" rx="18" ry="10" fill="#141414" stroke="#222" stroke-width="1.5"/>
  <ellipse cx="474" cy="252" rx="10" ry="5" fill="#1a1a1a"/>

  <!-- Robot body detail -->
  <rect x="318" y="256" width="164" height="52" rx="4" fill="#18201a" stroke="#263226" stroke-width="1"/>
  <!-- Control board -->
  <rect x="330" y="264" width="60" height="36" rx="2" fill="#0e1a0e" stroke="#1a2a1a" stroke-width="1"/>
  <rect x="334" y="268" width="6" height="6" rx="1" fill="#4ade80" opacity="0.6"/>
  <rect x="344" y="268" width="6" height="6" rx="1" fill="#818cf8" opacity="0.5"/>
  <rect x="334" y="278" width="52" height="2" rx="1" fill="#1e2e1e"/>
  <rect x="334" y="283" width="52" height="2" rx="1" fill="#1e2e1e"/>
  <rect x="334" y="288" width="30" height="2" rx="1" fill="#1e2e1e"/>
  <!-- Motor controller -->
  <rect x="406" y="264" width="64" height="36" rx="2" fill="#1a0e0e" stroke="#2a1a1a" stroke-width="1"/>
  <rect x="414" y="272" width="48" height="12" rx="1" fill="#0e0808"/>
  <text x="438" y="282" font-family="monospace" font-size="7" fill="#fb923c" text-anchor="middle" opacity="0.8">MOTOR CTL</text>

  <!-- Arm -->
  <rect x="390" y="200" width="20" height="52" rx="3" fill="url(#armGrad)" stroke="#2a3a2a" stroke-width="1"/>
  <rect x="382" y="192" width="36" height="12" rx="3" fill="#1e2a1e" stroke="#2a3a2a" stroke-width="1"/>
  <!-- Claw -->
  <path d="M376,186 L382,192 L382,184 Z" fill="#243024"/>
  <path d="M424,186 L418,192 L418,184 Z" fill="#243024"/>
  <rect x="382" y="180" width="36" height="12" rx="2" fill="#1a241a" stroke="#2a3a2a" stroke-width="1"/>

  <!-- Ultrasonic sensor -->
  <rect x="456" y="268" width="24" height="14" rx="2" fill="#0e1a24" stroke="#1e3040" stroke-width="1"/>
  <circle cx="462" cy="275" r="3" fill="#1e3a50"/>
  <circle cx="474" cy="275" r="3" fill="#1e3a50"/>
  <!-- Sonic waves -->
  <path d="M481,272 Q490,275 481,278" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
  <path d="M484,269 Q496,275 484,281" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.25"/>

  <!-- Status LED on robot -->
  <circle cx="344" cy="260" r="4" fill="#4ade80" opacity="0.9"/>
  <circle cx="344" cy="260" r="8" fill="#4ade80" opacity="0.1"/>

  <!-- Team badge -->
  <text x="400" y="440" font-family="monospace" font-size="10" fill="#2a3a2a" text-anchor="middle">Fox Valley Robotics · Team 7482</text>
</svg>
