<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <radialGradient id="vll-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e0e1e"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <radialGradient id="vll-glow" cx="600" cy="350" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="vll-glow-f" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#vll-bg)"/>
  <rect width="1200" height="700" fill="url(#vll-glow)"/>

  <g opacity="0.06">
    <circle cx="80" cy="50" r="1" fill="#6366f1"/>
    <circle cx="600" cy="28" r="0.8" fill="#6366f1"/>
    <circle cx="1140" cy="60" r="1" fill="#22d3ee"/>
    <circle cx="40" cy="650" r="1" fill="#a855f7"/>
  </g>

  <text x="600" y="40" font-family="monospace" font-size="9" fill="#2a2a55"
        text-anchor="middle" letter-spacing="3">LAZY LOADING  ·  EXTRACTION RETURNS A MANIFEST, NEVER PIXELS</text>

  <!-- STEP 1: extract_frames -->
  <rect x="60" y="120" width="220" height="170" rx="8" fill="#0b0b1c" stroke="#6366f1" stroke-width="1.4" filter="url(#vll-glow-f)"/>
  <text x="170" y="148" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="middle">1 · extract_frames()</text>
  <line x1="80" y1="160" x2="260" y2="160" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="80" y="184" font-family="monospace" font-size="8" fill="#4b4b90">ffmpeg → resize → JPEG</text>
  <text x="80" y="204" font-family="monospace" font-size="8" fill="#4b4b90">write frames to disk cache</text>
  <text x="80" y="224" font-family="monospace" font-size="8" fill="#4b4b90">phash dedup · budget cap</text>
  <rect x="80" y="240" width="180" height="34" rx="4" fill="#0a0a20"/>
  <text x="170" y="255" font-family="monospace" font-size="8" fill="#34d399" text-anchor="middle">returns: manifest JSON</text>
  <text x="170" y="268" font-family="monospace" font-size="7.5" fill="#1a5a3a" text-anchor="middle">~0 image tokens</text>

  <!-- arrow 1 -> cache -->
  <line x1="290" y1="205" x2="450" y2="205" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.5"/>
  <polygon points="450,205 440,200 440,210" fill="#22d3ee"/>
  <text x="370" y="196" font-family="monospace" font-size="7.5" fill="#1a6070" text-anchor="middle">store</text>

  <!-- CACHE node (center) -->
  <rect x="460" y="120" width="280" height="320" rx="10" fill="#06121a" stroke="#22d3ee" stroke-width="1.5" filter="url(#vll-glow-f)"/>
  <text x="600" y="148" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">~/.cache/video-to-text-mcp/</text>
  <text x="600" y="166" font-family="monospace" font-size="9" fill="#1a6070" text-anchor="middle">&lt;job_id&gt;/</text>
  <line x1="480" y1="178" x2="720" y2="178" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- manifest.json contents -->
  <rect x="486" y="192" width="228" height="150" rx="5" fill="#08080f" stroke="#1e3848" stroke-width="0.7"/>
  <text x="498" y="210" font-family="monospace" font-size="8" fill="#22d3ee">manifest.json</text>
  <text x="498" y="228" font-family="monospace" font-size="7.5" fill="#3a6a7a">  job_id, source, fps, mode</text>
  <text x="498" y="244" font-family="monospace" font-size="7.5" fill="#3a6a7a">  max_dimension, duration_sec</text>
  <text x="498" y="260" font-family="monospace" font-size="7.5" fill="#3a6a7a">  source_width / source_height</text>
  <text x="498" y="278" font-family="monospace" font-size="7.5" fill="#3a6a7a">  frames: [</text>
  <text x="498" y="294" font-family="monospace" font-size="7.5" fill="#5a8a9a">    {index, timestamp_sec,</text>
  <text x="498" y="310" font-family="monospace" font-size="7.5" fill="#5a8a9a">     path, phash}, …</text>
  <text x="498" y="326" font-family="monospace" font-size="7.5" fill="#3a6a7a">  ]</text>

  <!-- frames dir -->
  <rect x="486" y="352" width="228" height="72" rx="5" fill="#08080f" stroke="#1e3848" stroke-width="0.7"/>
  <text x="498" y="370" font-family="monospace" font-size="8" fill="#22d3ee">frames/</text>
  <text x="498" y="388" font-family="monospace" font-size="7.5" fill="#3a6a7a">  frame_00000.jpg … (resized)</text>
  <text x="498" y="406" font-family="monospace" font-size="7.5" fill="#1a5a3a">  on disk only — NOT sent to model</text>

  <!-- STEP 2: lazy view tools (right) -->
  <text x="900" y="110" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle" letter-spacing="2">2 · LOAD PIXELS ONLY ON DEMAND</text>

  <!-- get_contact_sheet -->
  <rect x="790" y="130" width="320" height="92" rx="8" fill="#120a1c" stroke="#a855f7" stroke-width="1.3" filter="url(#vll-glow-f)"/>
  <text x="806" y="154" font-family="monospace" font-size="9" fill="#c084fc">get_contact_sheet(job_id)</text>
  <text x="806" y="174" font-family="monospace" font-size="7.5" fill="#5a3a6a">→ montage many frames into ONE image</text>
  <text x="806" y="192" font-family="monospace" font-size="7.5" fill="#5a3a6a">→ scan a whole clip for ~1 frame's cost</text>
  <text x="806" y="210" font-family="monospace" font-size="7.5" fill="#34d399">cap: 36 tiles / sheet</text>

  <!-- get_frames -->
  <rect x="790" y="238" width="320" height="92" rx="8" fill="#120a1c" stroke="#a855f7" stroke-width="1.3" filter="url(#vll-glow-f)"/>
  <text x="806" y="262" font-family="monospace" font-size="9" fill="#c084fc">get_frames(job_id, indices=[…])</text>
  <text x="806" y="282" font-family="monospace" font-size="7.5" fill="#5a3a6a">→ pull only the frames you chose</text>
  <text x="806" y="300" font-family="monospace" font-size="7.5" fill="#5a3a6a">→ optional 1024px detail tier</text>
  <text x="806" y="318" font-family="monospace" font-size="7.5" fill="#34d399">cap: 30 frames / call</text>

  <!-- arrows cache -> view tools -->
  <line x1="744" y1="200" x2="788" y2="176" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.5"/>
  <polygon points="788,176 778,176 783,185" fill="#a855f7"/>
  <line x1="744" y1="284" x2="788" y2="284" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.5"/>
  <polygon points="788,284 778,279 778,289" fill="#a855f7"/>

  <!-- selective load callout -->
  <rect x="790" y="352" width="320" height="72" rx="8" fill="#0a0f0a" stroke="#34d399" stroke-width="1.1"/>
  <text x="950" y="378" font-family="monospace" font-size="8.5" fill="#34d399" text-anchor="middle">Model sees the index first, decides</text>
  <text x="950" y="396" font-family="monospace" font-size="8.5" fill="#34d399" text-anchor="middle">what's worth the tokens, THEN loads it.</text>
  <text x="950" y="414" font-family="monospace" font-size="7.5" fill="#1a5a3a" text-anchor="middle">pay-for-what-you-look-at</text>

  <!-- TTL / cleanup footer -->
  <rect x="60" y="470" width="1050" height="160" rx="8" fill="#08080f" stroke="#1e1e38" stroke-width="0.7"/>
  <text x="80" y="496" font-family="monospace" font-size="9" fill="#2a2a55" letter-spacing="2">LIFECYCLE</text>

  <!-- timeline -->
  <circle cx="140" cy="555" r="9" fill="#0e0e20" stroke="#6366f1" stroke-width="1.4"/>
  <text x="140" y="558" font-family="monospace" font-size="7" fill="#818cf8" text-anchor="middle">1</text>
  <text x="140" y="585" font-family="monospace" font-size="8" fill="#444480" text-anchor="middle">extract</text>
  <line x1="155" y1="555" x2="345" y2="555" stroke="#2a2a55" stroke-width="1"/>

  <circle cx="360" cy="555" r="9" fill="#0e0d1a" stroke="#a855f7" stroke-width="1.4"/>
  <text x="360" y="558" font-family="monospace" font-size="7" fill="#c084fc" text-anchor="middle">2</text>
  <text x="360" y="585" font-family="monospace" font-size="8" fill="#444480" text-anchor="middle">inspect (sheet/frames)</text>
  <line x1="375" y1="555" x2="585" y2="555" stroke="#2a2a55" stroke-width="1"/>

  <circle cx="600" cy="555" r="9" fill="#060d16" stroke="#22d3ee" stroke-width="1.4"/>
  <text x="600" y="558" font-family="monospace" font-size="7" fill="#22d3ee" text-anchor="middle">3</text>
  <text x="600" y="585" font-family="monospace" font-size="8" fill="#444480" text-anchor="middle">transcribe / timeline</text>
  <line x1="615" y1="555" x2="825" y2="555" stroke="#2a2a55" stroke-width="1"/>

  <circle cx="840" cy="555" r="9" fill="#0d0d1a" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="840" y="558" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">4</text>
  <text x="840" y="585" font-family="monospace" font-size="8" fill="#444480" text-anchor="middle">cleanup()</text>
  <line x1="855" y1="555" x2="1010" y2="555" stroke="#2a2a55" stroke-width="1" stroke-dasharray="3 3"/>

  <circle cx="1025" cy="555" r="9" fill="#1a1208" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="1025" y="558" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">⏲</text>
  <text x="1025" y="585" font-family="monospace" font-size="8" fill="#6a4a1a" text-anchor="middle">24h TTL auto-evict</text>

  <text x="585" y="614" font-family="monospace" font-size="8" fill="#333355" text-anchor="middle">jobs are reusable across tool calls — re-inspect without re-extracting</text>

</svg>
