<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="bg" cx="35%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#12121f"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff"/>
    </pattern>
    <marker id="arr-violet" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-orange" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#059669"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#dc2626"/>
    </marker>
    <filter id="glow-v" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)" opacity="0.04"/>

  <!-- Title -->
  <text x="30" y="36" fill="#252535" font-size="8" letter-spacing="0.18em" font-family="ui-monospace, monospace">AUTONOMOUS RESEARCHER · AGENT PIPELINE</text>

  <!-- Stage labels -->
  <text x="200" y="70" text-anchor="middle" fill="#7c3aed" font-size="7.5" letter-spacing="0.18em" font-family="ui-monospace, monospace" opacity="0.7">PLAN</text>
  <text x="345" y="70" text-anchor="middle" fill="#2563eb" font-size="7.5" letter-spacing="0.18em" font-family="ui-monospace, monospace" opacity="0.7">SEARCH</text>
  <text x="490" y="70" text-anchor="middle" fill="#ea580c" font-size="7.5" letter-spacing="0.18em" font-family="ui-monospace, monospace" opacity="0.7">EVALUATE</text>
  <text x="640" y="70" text-anchor="middle" fill="#059669" font-size="7.5" letter-spacing="0.18em" font-family="ui-monospace, monospace" opacity="0.7">SYNTHESIZE</text>

  <!-- Guide lines -->
  <line x1="200" y1="74" x2="200" y2="148" stroke="#7c3aed" stroke-width="0.5" stroke-dasharray="2,5" opacity="0.12"/>
  <line x1="345" y1="74" x2="345" y2="157" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2,5" opacity="0.12"/>
  <line x1="490" y1="74" x2="490" y2="157" stroke="#ea580c" stroke-width="0.5" stroke-dasharray="2,5" opacity="0.12"/>
  <line x1="640" y1="74" x2="640" y2="148" stroke="#059669" stroke-width="0.5" stroke-dasharray="2,5" opacity="0.12"/>

  <!-- Main flow arrows -->
  <line x1="94" y1="195" x2="153" y2="195" stroke="#6d28d9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-violet)" opacity="0.6"/>
  <line x1="243" y1="195" x2="308" y2="195" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-blue)" opacity="0.6"/>
  <line x1="379" y1="195" x2="452" y2="195" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-orange)" opacity="0.6"/>
  <line x1="524" y1="195" x2="594" y2="195" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-green)" opacity="0.6"/>
  <line x1="683" y1="195" x2="720" y2="195" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-green)" opacity="0.6"/>

  <!-- Scrape label on Search→Evaluate arrow -->
  <text x="417" y="189" text-anchor="middle" fill="#374151" font-size="6.5" letter-spacing="0.06em" font-family="ui-monospace, monospace">scrape · html</text>

  <!-- Retry loop: Evaluate → Searcher (score below threshold) -->
  <path d="M490,229 L490,310 L345,310 L345,229" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,4" fill="none" marker-end="url(#arr-red)" opacity="0.5"/>
  <text x="417" y="328" text-anchor="middle" fill="#dc2626" font-size="7" letter-spacing="0.07em" font-family="ui-monospace, monospace" opacity="0.6">score &lt; 5 · refine query · max 3 retries</text>

  <!-- Sub-questions branching from Planner -->
  <line x1="200" y1="238" x2="200" y2="258" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>
  <line x1="200" y1="258" x2="160" y2="278" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>
  <line x1="200" y1="258" x2="187" y2="278" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>
  <line x1="200" y1="258" x2="213" y2="278" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>
  <line x1="200" y1="258" x2="240" y2="278" stroke="#7c3aed" stroke-width="0.8" opacity="0.28"/>

  <circle cx="160" cy="286" r="10" fill="#0d0d1e" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
  <circle cx="187" cy="286" r="10" fill="#0d0d1e" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
  <circle cx="213" cy="286" r="10" fill="#0d0d1e" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
  <circle cx="240" cy="286" r="10" fill="#0d0d1e" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
  <text x="160" y="290" text-anchor="middle" fill="#7c3aed" font-size="5.5" font-family="ui-monospace,monospace" opacity="0.6">q1</text>
  <text x="187" y="290" text-anchor="middle" fill="#7c3aed" font-size="5.5" font-family="ui-monospace,monospace" opacity="0.6">q2</text>
  <text x="213" y="290" text-anchor="middle" fill="#7c3aed" font-size="5.5" font-family="ui-monospace,monospace" opacity="0.6">q3</text>
  <text x="240" y="290" text-anchor="middle" fill="#7c3aed" font-size="5.5" font-family="ui-monospace,monospace" opacity="0.6">q4</text>
  <text x="200" y="310" text-anchor="middle" fill="#3b2a5c" font-size="7" letter-spacing="0.06em" font-family="ui-monospace, monospace">4 sub-questions</text>

  <!-- ── NODES ── -->

  <!-- User Input -->
  <circle cx="65" cy="195" r="28" fill="#0c0c14" stroke="#4b5563" stroke-width="1.2"/>
  <text x="65" y="192" text-anchor="middle" fill="#9ca3af" font-size="8" letter-spacing="0.04em" font-family="ui-monospace, monospace">USER</text>
  <text x="65" y="204" text-anchor="middle" fill="#6b7280" font-size="7" font-family="ui-monospace, monospace">INPUT</text>

  <!-- Planner (violet, large, LLM) -->
  <circle cx="200" cy="195" r="42" fill="#0d0d1e" stroke="#7c3aed" stroke-width="1.8" filter="url(#glow-v)"/>
  <circle cx="200" cy="195" r="36" fill="none" stroke="#7c3aed" stroke-width="0.4" opacity="0.22"/>
  <text x="200" y="191" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="0.04em" font-family="ui-monospace, monospace">PLANNER</text>
  <text x="200" y="204" text-anchor="middle" fill="#5b21b6" font-size="7" font-family="ui-monospace, monospace">llm · ollama</text>

  <!-- Searcher (blue) -->
  <circle cx="345" cy="195" r="33" fill="#08081a" stroke="#2563eb" stroke-width="1.5"/>
  <text x="345" y="191" text-anchor="middle" fill="#60a5fa" font-size="9" letter-spacing="0.04em" font-family="ui-monospace, monospace">SEARCHER</text>
  <text x="345" y="204" text-anchor="middle" fill="#1e3a8a" font-size="7" font-family="ui-monospace, monospace">duckduckgo</text>

  <!-- Evaluator (orange) -->
  <circle cx="490" cy="195" r="33" fill="#120a06" stroke="#ea580c" stroke-width="1.5"/>
  <text x="490" y="191" text-anchor="middle" fill="#fb923c" font-size="9" letter-spacing="0.04em" font-family="ui-monospace, monospace">EVALUATE</text>
  <text x="490" y="204" text-anchor="middle" fill="#7c2d12" font-size="7" font-family="ui-monospace, monospace">llm · score 0-10</text>

  <!-- Synthesizer (green, large, LLM) -->
  <circle cx="640" cy="195" r="42" fill="#081210" stroke="#059669" stroke-width="1.8" filter="url(#glow-g)"/>
  <circle cx="640" cy="195" r="36" fill="none" stroke="#059669" stroke-width="0.4" opacity="0.22"/>
  <text x="640" y="191" text-anchor="middle" fill="#34d399" font-size="9" letter-spacing="0.04em" font-family="ui-monospace, monospace">SYNTHESIZE</text>
  <text x="640" y="204" text-anchor="middle" fill="#064e3b" font-size="7" font-family="ui-monospace, monospace">llm · ollama</text>

  <!-- Report output -->
  <rect x="720" y="178" width="62" height="34" rx="3" fill="#061210" stroke="#0d9488" stroke-width="1.2"/>
  <text x="751" y="193" text-anchor="middle" fill="#2dd4bf" font-size="8" letter-spacing="0.04em" font-family="ui-monospace, monospace">REPORT</text>
  <text x="751" y="206" text-anchor="middle" fill="#0f766e" font-size="6.5" font-family="ui-monospace, monospace">*.md cited</text>

  <!-- Legend -->
  <rect x="30" y="388" width="490" height="44" rx="2" fill="#0c0c14" stroke="#171724" stroke-width="1"/>
  <text x="46" y="404" fill="#252535" font-size="7" letter-spacing="0.14em" font-family="ui-monospace, monospace">STACK</text>
  <text x="46" y="420" fill="#3c3c5a" font-size="7" font-family="ui-monospace, monospace">TypeScript · Node.js</text>
  <text x="150" y="420" fill="#3c3c5a" font-size="7" font-family="ui-monospace, monospace">Ollama (local LLM)</text>
  <text x="255" y="420" fill="#3c3c5a" font-size="7" font-family="ui-monospace, monospace">DuckDuckGo · axios · cheerio</text>
  <text x="390" y="420" fill="#3c3c5a" font-size="7" font-family="ui-monospace, monospace">React · Vite · Express SSE</text>

  <text x="540" y="404" fill="#252535" font-size="7" letter-spacing="0.1em" font-family="ui-monospace, monospace">CONFIG</text>
  <text x="540" y="420" fill="#3c3c5a" font-size="7" font-family="ui-monospace, monospace">threshold 5/10 · retries 3 · ./reports/</text>
</svg>
