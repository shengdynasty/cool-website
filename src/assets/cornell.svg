<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="70%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="120" cy="15" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="40" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="310" cy="20" r="1" fill="#fff" opacity="0.45"/>
  <circle cx="450" cy="10" r="1.5" fill="#fff" opacity="0.35"/>
  <circle cx="580" cy="28" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="680" cy="12" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="760" cy="35" r="0.9" fill="#fff" opacity="0.3"/>
  <circle cx="730" cy="60" r="1" fill="#fff" opacity="0.25"/>
  <circle cx="90" cy="65" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="380" cy="55" r="1" fill="#fff" opacity="0.35"/>

  <!-- Ground -->
  <rect x="0" y="350" width="800" height="100" fill="#0a0a0a"/>
  <rect x="0" y="346" width="800" height="8" fill="#111"/>

  <!-- === McGraw Tower (center, iconic Cornell clock tower) === -->
  <!-- Tower base -->
  <rect x="348" y="180" width="104" height="170" fill="url(#building)" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Tower mid section -->
  <rect x="358" y="120" width="84" height="65" fill="#161620" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Tower belfry -->
  <rect x="368" y="74" width="64" height="50" fill="#141420" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Spire -->
  <polygon points="400,20 376,78 424,78" fill="#12121c" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Spire tip light -->
  <circle cx="400" cy="22" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="400" cy="22" r="8" fill="#fbbf24" opacity="0.1"/>

  <!-- Clock face -->
  <circle cx="400" cy="100" r="20" fill="#0a0a14" stroke="#2a2a3e" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="16" fill="none" stroke="#1e1e30" stroke-width="1"/>
  <!-- Clock hands -->
  <line x1="400" y1="100" x2="400" y2="86" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="400" y1="100" x2="411" y2="106" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Clock numerals (subtle) -->
  <text x="400" y="90" font-family="serif" font-size="6" fill="#333" text-anchor="middle">XII</text>
  <text x="413" y="104" font-family="serif" font-size="6" fill="#333" text-anchor="middle">III</text>
  <text x="400" y="118" font-family="serif" font-size="6" fill="#333" text-anchor="middle">VI</text>
  <text x="388" y="104" font-family="serif" font-size="6" fill="#333" text-anchor="middle">IX</text>

  <!-- Tower windows (belfry) -->
  <rect x="376" y="82" width="10" height="14" rx="2" fill="#1a1a30"/>
  <rect x="392" y="82" width="10" height="14" rx="2" fill="#1a1a30"/>
  <rect x="408" y="82" width="10" height="14" rx="2" fill="#1a1a30"/>
  <!-- Tower windows (mid) -->
  <rect x="366" y="130" width="14" height="18" rx="2" fill="#0e1a2e"/>
  <rect x="393" y="130" width="14" height="18" rx="2" fill="#0e1a2e"/>
  <rect x="420" y="130" width="14" height="18" rx="2" fill="#0e1a2e" opacity="0.5"/>
  <!-- Lit window -->
  <rect x="393" y="130" width="14" height="18" rx="2" fill="#fbbf24" opacity="0.15"/>

  <!-- Tower base windows -->
  <rect x="356" y="196" width="16" height="22" rx="2" fill="#0e1a2e"/>
  <rect x="382" y="196" width="16" height="22" rx="2" fill="#0e1a2e"/>
  <rect x="406" y="196" width="16" height="22" rx="2" fill="#0e1a2e"/>
  <rect x="430" y="196" width="16" height="22" rx="2" fill="#0e1a2e"/>

  <!-- Arched entrance -->
  <path d="M378,350 L378,310 Q400,290 422,310 L422,350 Z" fill="#0a0a10"/>

  <!-- === Left wing building === -->
  <rect x="120" y="240" width="224" height="110" fill="#121218" stroke="#1a1a24" stroke-width="1"/>
  <rect x="140" y="210" width="180" height="34" fill="#141420" stroke="#1a1a24" stroke-width="1"/>
  <!-- Colonnade pillars -->
  <rect x="148" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="172" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="196" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="220" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="244" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="268" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="292" y="280" width="8" height="70" fill="#1a1a26"/>
  <!-- Left building windows (lit) -->
  <rect x="152" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.1"/>
  <rect x="182" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.18"/>
  <rect x="212" y="248" width="18" height="22" rx="1" fill="#0e1a2e"/>
  <rect x="242" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.08"/>
  <rect x="272" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.14"/>
  <rect x="302" y="248" width="18" height="22" rx="1" fill="#0e1a2e"/>

  <!-- === Right wing building === -->
  <rect x="456" y="240" width="224" height="110" fill="#121218" stroke="#1a1a24" stroke-width="1"/>
  <rect x="480" y="210" width="180" height="34" fill="#141420" stroke="#1a1a24" stroke-width="1"/>
  <!-- Colonnade pillars -->
  <rect x="464" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="488" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="512" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="536" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="560" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="584" y="280" width="8" height="70" fill="#1a1a26"/>
  <rect x="608" y="280" width="8" height="70" fill="#1a1a26"/>
  <!-- Right building windows (lit) -->
  <rect x="468" y="248" width="18" height="22" rx="1" fill="#0e1a2e"/>
  <rect x="498" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.16"/>
  <rect x="528" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.1"/>
  <rect x="558" y="248" width="18" height="22" rx="1" fill="#0e1a2e"/>
  <rect x="588" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.12"/>
  <rect x="618" y="248" width="18" height="22" rx="1" fill="#fbbf24" opacity="0.09"/>

  <!-- Ground path / plaza lighting -->
  <ellipse cx="400" cy="354" rx="260" ry="10" fill="#fbbf24" opacity="0.04"/>
  <rect x="380" y="350" width="40" height="4" fill="#1a1a1a"/>

  <!-- Lamp posts -->
  <rect x="240" y="300" width="3" height="52" fill="#1e1e1e"/>
  <circle cx="241" cy="298" r="5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="241" cy="298" r="14" fill="#fbbf24" opacity="0.04"/>

  <rect x="557" y="300" width="3" height="52" fill="#1e1e1e"/>
  <circle cx="558" cy="298" r="5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="558" cy="298" r="14" fill="#fbbf24" opacity="0.04"/>

  <!-- === Regression curve overlay (econometrics theme) === -->
  <g opacity="0.55">
    <!-- Scatter plot dots -->
    <circle cx="60" cy="190" r="2.5" fill="#4ade80" opacity="0.6"/>
    <circle cx="80" cy="175" r="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="100" cy="168" r="2.5" fill="#4ade80" opacity="0.7"/>
    <circle cx="118" cy="155" r="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="138" cy="148" r="2.5" fill="#4ade80" opacity="0.65"/>
    <circle cx="155" cy="136" r="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="175" cy="130" r="2.5" fill="#4ade80" opacity="0.6"/>

    <!-- OLS regression line -->
    <line x1="50" y1="198" x2="185" y2="122" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

    <!-- R² label -->
    <text x="58" y="215" font-family="monospace" font-size="9" fill="#4ade80" opacity="0.7">R² = 0.94</text>
    <text x="58" y="228" font-family="monospace" font-size="8" fill="#2a4a2a" opacity="0.8">β = 1.24 (p&lt;0.01)</text>
  </g>

  <!-- Right side: formula overlay -->
  <g opacity="0.5">
    <text x="620" y="160" font-family="monospace" font-size="10" fill="#818cf8">Ŷ = β₀ + β₁X + ε</text>
    <text x="640" y="178" font-family="monospace" font-size="9" fill="#444">OLS estimator</text>
    <text x="620" y="198" font-family="monospace" font-size="9" fill="#555">H₀: β₁ = 0</text>
    <text x="620" y="214" font-family="monospace" font-size="9" fill="#555">t = 8.32 ✓</text>
  </g>

  <!-- Cornell wordmark (subtle) -->
  <text x="400" y="406" font-family="serif" font-size="18" fill="#2a2a3a" text-anchor="middle" font-weight="bold" letter-spacing="4">CORNELL</text>
  <text x="400" y="422" font-family="monospace" font-size="9" fill="#1e1e2e" text-anchor="middle" letter-spacing="2">UNIVERSITY · SUMMER 2026</text>
</svg>
