<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <radialGradient id="vtt-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e0e1e"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <radialGradient id="vtt-center-glow" cx="600" cy="360" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="vtt-node-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vtt-small-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vtt-edge-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#vtt-bg)"/>
  <rect width="1200" height="700" fill="url(#vtt-center-glow)"/>

  <!-- Subtle dot field -->
  <g opacity="0.06">
    <circle cx="60" cy="60" r="1" fill="#6366f1"/>
    <circle cx="180" cy="45" r="0.8" fill="#6366f1"/>
    <circle cx="320" cy="30" r="1" fill="#6366f1"/>
    <circle cx="500" cy="20" r="0.8" fill="#6366f1"/>
    <circle cx="680" cy="35" r="1" fill="#6366f1"/>
    <circle cx="850" cy="22" r="0.8" fill="#6366f1"/>
    <circle cx="1000" cy="40" r="1" fill="#6366f1"/>
    <circle cx="1150" cy="28" r="0.8" fill="#6366f1"/>
    <circle cx="40" cy="200" r="0.8" fill="#8b5cf6"/>
    <circle cx="1160" cy="180" r="1" fill="#8b5cf6"/>
    <circle cx="30" cy="500" r="1" fill="#a855f7"/>
    <circle cx="1170" cy="520" r="0.8" fill="#22d3ee"/>
    <circle cx="100" cy="650" r="0.8" fill="#a855f7"/>
    <circle cx="600" cy="680" r="1" fill="#6366f1"/>
    <circle cx="1100" cy="660" r="0.8" fill="#22d3ee"/>
  </g>

  <!-- Title -->
  <text x="600" y="26" font-family="monospace" font-size="8.5" fill="#1e1e40"
        text-anchor="middle" letter-spacing="3">VIDEO-TO-TEXT MCP SERVER  ·  7 TOOLS  ·  Python · FastMCP · ffmpeg · faster-whisper  ·  TOKEN-BUDGETED</text>

  <!-- ══════════════════════════════════════════
       EDGES — drawn behind nodes
  ══════════════════════════════════════════ -->

  <!-- Claude ↔ MCP Server -->
  <line x1="122" y1="360" x2="412" y2="360" stroke="#6366f1" stroke-width="1.8" stroke-opacity="0.5" filter="url(#vtt-edge-glow)"/>
  <line x1="122" y1="360" x2="228" y2="360" stroke="#6366f1" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="254" y1="360" x2="412" y2="360" stroke="#6366f1" stroke-width="2" stroke-opacity="0.7"/>

  <!-- MCP Server ↔ tool nodes -->
  <line x1="468" y1="318" x2="560" y2="120" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="478" y1="328" x2="640" y2="175" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="486" y1="345" x2="700" y2="262" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="486" y1="375" x2="700" y2="458" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="478" y1="392" x2="640" y2="545" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="468" y1="402" x2="560" y2="600" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="450" y1="408" x2="450" y2="560" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>

  <!-- MCP Server ↔ ffmpeg engine -->
  <line x1="488" y1="360" x2="840" y2="300" stroke="#6366f1" stroke-width="1.6" stroke-opacity="0.5" filter="url(#vtt-edge-glow)"/>
  <!-- ffmpeg ↔ frames cache -->
  <line x1="872" y1="318" x2="1000" y2="225" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.45"/>
  <!-- ffmpeg ↔ audio/whisper -->
  <line x1="872" y1="335" x2="1010" y2="430" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.45"/>
  <!-- frames cache ↔ manifest -->
  <line x1="1010" y1="248" x2="1010" y2="400" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3"/>

  <!-- ══════════════════════════════════════════
       TOOL NODES (the 7 MCP tools)
  ══════════════════════════════════════════ -->
  <!-- probe_video -->
  <circle cx="560" cy="112" r="14" fill="#6366f1" opacity="0.06"/>
  <circle cx="560" cy="112" r="8" fill="#0e0e20" stroke="#6366f1" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="560" y="100" font-family="monospace" font-size="6" fill="#818cf8" text-anchor="middle">probe_video</text>

  <!-- extract_frames -->
  <circle cx="648" cy="170" r="14" fill="#6366f1" opacity="0.06"/>
  <circle cx="648" cy="170" r="8" fill="#0e0e20" stroke="#6366f1" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="686" y="172" font-family="monospace" font-size="6" fill="#818cf8">extract_frames</text>

  <!-- get_contact_sheet -->
  <circle cx="708" cy="258" r="14" fill="#a855f7" opacity="0.06"/>
  <circle cx="708" cy="258" r="8" fill="#0e0d1a" stroke="#a855f7" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="746" y="260" font-family="monospace" font-size="6" fill="#c084fc">get_contact_sheet</text>

  <!-- get_frames -->
  <circle cx="708" cy="462" r="14" fill="#a855f7" opacity="0.06"/>
  <circle cx="708" cy="462" r="8" fill="#0e0d1a" stroke="#a855f7" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="746" y="464" font-family="monospace" font-size="6" fill="#c084fc">get_frames</text>

  <!-- transcribe -->
  <circle cx="648" cy="550" r="14" fill="#22d3ee" opacity="0.06"/>
  <circle cx="648" cy="550" r="8" fill="#060d16" stroke="#22d3ee" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="686" y="552" font-family="monospace" font-size="6" fill="#22d3ee">transcribe</text>

  <!-- build_timeline -->
  <circle cx="560" cy="608" r="14" fill="#22d3ee" opacity="0.06"/>
  <circle cx="560" cy="608" r="8" fill="#060d16" stroke="#22d3ee" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="560" y="628" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="middle">build_timeline</text>

  <!-- cleanup -->
  <circle cx="450" cy="572" r="14" fill="#7c3aed" opacity="0.06"/>
  <circle cx="450" cy="572" r="8" fill="#0d0d1a" stroke="#7c3aed" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="450" y="592" font-family="monospace" font-size="6" fill="#a78bfa" text-anchor="middle">cleanup</text>

  <!-- ══════════════════════════════════════════
       INFRASTRUCTURE NODES
  ══════════════════════════════════════════ -->

  <!-- ffmpeg / ffprobe engine -->
  <circle cx="855" cy="326" r="30" fill="#6366f1" opacity="0.07"/>
  <circle cx="855" cy="326" r="20" fill="#0c0c20" stroke="#6366f1" stroke-width="1.5" filter="url(#vtt-node-glow)"/>
  <text x="855" y="322" font-family="monospace" font-size="6.5" fill="#818cf8" text-anchor="middle">ffmpeg</text>
  <text x="855" y="333" font-family="monospace" font-size="5.5" fill="#4b4b90" text-anchor="middle">ffprobe</text>
  <text x="855" y="362" font-family="monospace" font-size="5.5" fill="#2a2a55" text-anchor="middle">shell-out</text>

  <!-- frames cache -->
  <circle cx="1012" cy="218" r="26" fill="#22d3ee" opacity="0.06"/>
  <circle cx="1012" cy="218" r="17" fill="#060d16" stroke="#22d3ee" stroke-width="1.4" filter="url(#vtt-small-glow)"/>
  <text x="1012" y="214" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="middle">frames/</text>
  <text x="1012" y="225" font-family="monospace" font-size="5.5" fill="#1a6070" text-anchor="middle">.jpg</text>
  <text x="1012" y="252" font-family="monospace" font-size="5.5" fill="#164a5a" text-anchor="middle">resized ≤512px</text>

  <!-- manifest -->
  <circle cx="1012" cy="424" r="26" fill="#22d3ee" opacity="0.06"/>
  <circle cx="1012" cy="424" r="17" fill="#060d16" stroke="#22d3ee" stroke-width="1.4" filter="url(#vtt-small-glow)"/>
  <text x="1012" y="420" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="middle">manifest</text>
  <text x="1012" y="431" font-family="monospace" font-size="5.5" fill="#1a6070" text-anchor="middle">.json</text>
  <text x="1012" y="458" font-family="monospace" font-size="5.5" fill="#164a5a" text-anchor="middle">job_id · 24h TTL</text>

  <!-- faster-whisper -->
  <circle cx="1020" cy="540" r="24" fill="#a855f7" opacity="0.07"/>
  <circle cx="1020" cy="540" r="16" fill="#0d0c20" stroke="#a855f7" stroke-width="1.4" filter="url(#vtt-small-glow)"/>
  <text x="1020" y="536" font-family="monospace" font-size="5.5" fill="#c084fc" text-anchor="middle">faster-</text>
  <text x="1020" y="546" font-family="monospace" font-size="5.5" fill="#c084fc" text-anchor="middle">whisper</text>
  <text x="1020" y="572" font-family="monospace" font-size="5.5" fill="#5a3a6a" text-anchor="middle">CPU · int8</text>

  <!-- ══════════════════════════════════════════
       MAIN NODES
  ══════════════════════════════════════════ -->

  <!-- Claude -->
  <circle cx="90" cy="360" r="55" fill="#818cf8" opacity="0.06"/>
  <circle cx="90" cy="360" r="42" fill="#818cf8" opacity="0.03"/>
  <circle cx="90" cy="360" r="30" fill="#0c0c24" stroke="#6366f1" stroke-width="2" filter="url(#vtt-node-glow)"/>
  <text x="90" y="354" font-family="monospace" font-size="9" fill="#818cf8" text-anchor="middle">✦</text>
  <text x="90" y="368" font-family="Georgia,serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Claude</text>
  <text x="90" y="401" font-family="monospace" font-size="6" fill="#333368" text-anchor="middle">vision model</text>
  <text x="90" y="412" font-family="monospace" font-size="6" fill="#222245" text-anchor="middle">MCP Client Host</text>

  <!-- MCP Server (center) -->
  <circle cx="450" cy="360" r="70" fill="#6366f1" opacity="0.08"/>
  <circle cx="450" cy="360" r="55" fill="#6366f1" opacity="0.04"/>
  <circle cx="450" cy="360" r="38" fill="#0c0c20" stroke="#6366f1" stroke-width="2.2" filter="url(#vtt-node-glow)"/>
  <circle cx="450" cy="360" r="30" fill="none" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="450" y="350" font-family="monospace" font-size="8" fill="#818cf8" text-anchor="middle">MCP</text>
  <text x="450" y="362" font-family="monospace" font-size="8" fill="#818cf8" text-anchor="middle">Server</text>
  <text x="450" y="374" font-family="monospace" font-size="6" fill="#4b4b90" text-anchor="middle">"video-to-text"</text>
  <text x="450" y="384" font-family="monospace" font-size="5.5" fill="#333368" text-anchor="middle">FastMCP · stdio</text>
  <text x="450" y="405" font-family="monospace" font-size="5.5" fill="#222248" text-anchor="middle">7 tools registered</text>

  <!-- Protocol intermediate node -->
  <circle cx="241" cy="360" r="22" fill="#6366f1" opacity="0.08"/>
  <circle cx="241" cy="360" r="14" fill="#0a0a1e" stroke="#6366f1" stroke-width="1.3" filter="url(#vtt-small-glow)"/>
  <text x="241" y="356" font-family="monospace" font-size="5.5" fill="#6366f1" text-anchor="middle">JSON-RPC</text>
  <text x="241" y="366" font-family="monospace" font-size="5.5" fill="#6366f1" text-anchor="middle">2.0</text>
  <text x="241" y="382" font-family="monospace" font-size="5.5" fill="#2a2a55" text-anchor="middle">stdin/stdout</text>

  <!-- Edge labels -->
  <rect x="270" y="345" width="52" height="13" rx="3" fill="#0a0a20"/>
  <text x="296" y="355" font-family="monospace" font-size="5.5" fill="#444488" text-anchor="middle">tools/call</text>

  <rect x="610" y="298" width="78" height="13" rx="3" fill="#06090f"/>
  <text x="649" y="308" font-family="monospace" font-size="5.5" fill="#1a5a6a" text-anchor="middle">subprocess · pipe</text>

  <!-- Legend -->
  <rect x="20" y="560" width="200" height="116" rx="4" fill="#08080f" stroke="#1e1e38" stroke-width="0.6"/>
  <text x="120" y="576" font-family="monospace" font-size="6.5" fill="#222248" text-anchor="middle">Pipeline Stages</text>
  <circle cx="40" cy="592" r="6" fill="#0e0e20" stroke="#6366f1" stroke-width="1.2"/>
  <text x="55" y="596" font-family="monospace" font-size="6" fill="#444480">Probe / Extract (frames)</text>
  <circle cx="40" cy="610" r="6" fill="#0e0d1a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="55" y="614" font-family="monospace" font-size="6" fill="#444480">Lazy view (sheet/frames)</text>
  <circle cx="40" cy="628" r="6" fill="#060d16" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="55" y="632" font-family="monospace" font-size="6" fill="#444480">Transcribe / Timeline</text>
  <circle cx="40" cy="646" r="6" fill="#0d0d1a" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="55" y="650" font-family="monospace" font-size="6" fill="#444480">Cleanup (TTL evict)</text>
  <circle cx="40" cy="664" r="6" fill="#0c0c20" stroke="#6366f1" stroke-width="2"/>
  <text x="55" y="668" font-family="monospace" font-size="6" fill="#444480">MCP Server (hub)</text>

</svg>
