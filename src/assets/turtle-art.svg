<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#0f0f0f"/>
  <!-- Top bar -->
  <rect width="800" height="40" fill="#1a1a1a"/>
  <circle cx="20" cy="20" r="6" fill="#333"/>
  <circle cx="40" cy="20" r="6" fill="#333"/>
  <circle cx="60" cy="20" r="6" fill="#333"/>
  <text x="400" y="26" font-family="monospace" font-size="12" fill="#555" text-anchor="middle">turtle_art.py</text>

  <!-- Canvas area -->
  <rect x="16" y="52" width="768" height="382" fill="#111" rx="2"/>

  <!-- Spiral 1 - center large, green -->
  <g transform="translate(400,240)">
    <path d="M0,0 Q20,-20 40,0 Q60,20 40,40 Q20,60 -20,40 Q-60,20 -60,-20 Q-60,-70 -20,-80 Q30,-90 70,-60 Q110,-20 100,40 Q90,100 40,120 Q-20,140 -70,110 Q-120,70 -120,0 Q-120,-70 -70,-110 Q-20,-150 50,-140 Q120,-130 150,-60 Q180,20 150,90" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.9"/>
    <path d="M0,0 Q-15,15 -30,0 Q-45,-15 -30,-30 Q-15,-45 15,-30 Q45,-15 45,15 Q45,45 15,60 Q-20,75 -50,55 Q-80,35 -80,-5 Q-80,-45 -50,-65 Q-20,-85 20,-75 Q60,-65 75,-25 Q90,15 70,55" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 Q10,10 0,20 Q-10,30 -20,20 Q-30,10 -20,0 Q-10,-10 5,-5" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Spiral 2 - top left, smaller -->
  <g transform="translate(160,160)">
    <path d="M0,0 Q15,-15 30,0 Q45,15 30,30 Q15,45 -15,30 Q-45,15 -45,-15 Q-45,-50 -15,-60 Q20,-70 55,-45 Q85,-15 75,30" fill="none" stroke="#fb923c" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 Q-10,10 -20,0 Q-30,-10 -20,-20 Q-10,-30 5,-20 Q15,-10 10,5" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Spiral 3 - bottom right -->
  <g transform="translate(630,330)">
    <path d="M0,0 Q12,-12 24,0 Q36,12 24,24 Q12,36 -12,24 Q-36,12 -36,-12 Q-36,-40 -12,-48 Q16,-56 44,-36 Q68,-12 60,24" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.65"/>
  </g>

  <!-- Geometric flower - top right -->
  <g transform="translate(650,140)">
    <polygon points="0,-50 14,-19 47,-15 24,10 29,44 0,28 -29,44 -24,10 -47,-15 -14,-19" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <polygon points="0,-30 9,-11 28,-9 14,6 17,26 0,17 -17,26 -14,6 -28,-9 -9,-11" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#e879f9" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Geometric star - bottom left -->
  <g transform="translate(140,340)">
    <polygon points="0,-40 11,-15 38,-12 19,8 23,35 0,22 -23,35 -19,8 -38,-12 -11,-15" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Turtle cursor at end of main spiral -->
  <g transform="translate(550,170) rotate(-30)">
    <polygon points="0,-8 6,4 -6,4" fill="#4ade80" opacity="0.9"/>
  </g>

  <!-- Status bar -->
  <rect x="16" y="414" width="768" height="20" fill="#1a1a1a" rx="1"/>
  <text x="30" y="428" font-family="monospace" font-size="10" fill="#4ade80">● running</text>
  <text x="200" y="428" font-family="monospace" font-size="10" fill="#555">speed: 0 | shapes: 3 | colors: 7</text>
  <text x="600" y="428" font-family="monospace" font-size="10" fill="#555">press [s] to save</text>
</svg>
