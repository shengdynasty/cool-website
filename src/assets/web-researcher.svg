<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131325"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <marker id="arr-am" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#e8931a" opacity="0.55"/>
    </marker>
    <marker id="arr-or" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#ea580c" opacity="0.55"/>
    </marker>
    <marker id="arr-in" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#6366f1" opacity="0.55"/>
    </marker>
    <marker id="arr-bl" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#2563eb" opacity="0.55"/>
    </marker>
    <marker id="arr-gr" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#059669" opacity="0.55"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGlow)"/>
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#fff" opacity="0.04"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Title -->
  <text x="400" y="28" font-family="monospace" font-size="11" fill="#333" text-anchor="middle" letter-spacing="2">WEB RESEARCHER — PIPELINE ARCHITECTURE</text>

  <!-- ── ARROWS (drawn behind nodes) ── -->

  <!-- 1. User Query → DuckDuckGo (diagonal up-right, via Vite proxy) -->
  <line x1="143" y1="178" x2="240" y2="118"
        stroke="#ea580c" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6,4"
        marker-end="url(#arr-or)"/>
  <rect x="162" y="131" width="54" height="14" rx="7" fill="#180a05" stroke="#ea580c" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="189" y="141" font-family="monospace" font-size="8" fill="#fb923c" text-anchor="middle">/ddg-api</text>

  <!-- 2. DuckDuckGo → Prompt Builder (diagonal down-right) -->
  <line x1="310" y1="112" x2="412" y2="172"
        stroke="#ea580c" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6,4"
        marker-end="url(#arr-or)"/>
  <rect x="337" y="128" width="48" height="14" rx="7" fill="#180a05" stroke="#ea580c" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="361" y="138" font-family="monospace" font-size="8" fill="#fb923c" text-anchor="middle">results</text>

  <!-- 3. User Query → Prompt Builder (horizontal, topic) -->
  <line x1="153" y1="208" x2="412" y2="208"
        stroke="#e8931a" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6,4"
        marker-end="url(#arr-am)"/>
  <rect x="259" y="200" width="40" height="14" rx="7" fill="#130a00" stroke="#e8931a" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="279" y="210" font-family="monospace" font-size="8" fill="#e8931a" text-anchor="middle">topic</text>

  <!-- 4. Prompt Builder → Ollama (horizontal right) -->
  <line x1="496" y1="208" x2="580" y2="208"
        stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6,4"
        marker-end="url(#arr-in)"/>
  <rect x="514" y="200" width="50" height="14" rx="7" fill="#0d0d1c" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="539" y="210" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">generate</text>

  <!-- 5. Ollama → React UI (curved down-left, stream) -->
  <path d="M 635,246 C 635,330 410,310 410,330"
        stroke="#059669" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6,4" fill="none"
        marker-end="url(#arr-gr)"/>
  <rect x="541" y="298" width="44" height="14" rx="7" fill="#071410" stroke="#059669" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="563" y="308" font-family="monospace" font-size="8" fill="#34d399" text-anchor="middle">stream</text>

  <!-- 6. React UI → User (bottom arc, render) -->
  <path d="M 372,370 C 300,415 180,415 115,378"
        stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="6,4" fill="none"
        marker-end="url(#arr-bl)"/>
  <rect x="215" y="403" width="44" height="14" rx="7" fill="#060f1c" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="237" y="413" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">render</text>

  <!-- ── NODES ── -->

  <!-- User Query (115, 208) -->
  <circle cx="115" cy="208" r="38" fill="#130a00" stroke="#e8931a" stroke-width="1.6"/>
  <!-- person icon -->
  <circle cx="115" cy="196" r="8" fill="none" stroke="#e8931a" stroke-width="1.3"/>
  <path d="M 100,218 Q 115,209 130,218" stroke="#e8931a" stroke-width="1.3" fill="none"/>
  <text x="115" y="260" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">User Query</text>
  <text x="115" y="272" font-family="monospace" font-size="7.5" fill="#555555" text-anchor="middle">topic input</text>

  <!-- DuckDuckGo (275, 90) -->
  <circle cx="275" cy="90" r="38" fill="#180a05" stroke="#ea580c" stroke-width="1.6"/>
  <!-- magnifying glass -->
  <circle cx="270" cy="84" r="10" fill="none" stroke="#ea580c" stroke-width="1.4"/>
  <line x1="278" y1="92" x2="287" y2="103" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  <text x="275" y="142" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">DuckDuckGo</text>
  <text x="275" y="154" font-family="monospace" font-size="7.5" fill="#555555" text-anchor="middle">instant answers</text>

  <!-- Prompt Builder (454, 208) -->
  <circle cx="454" cy="208" r="38" fill="#0d0d0d" stroke="#64748b" stroke-width="1.6"/>
  <!-- text lines icon -->
  <line x1="440" y1="198" x2="468" y2="198" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="440" y1="205" x2="468" y2="205" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="440" y1="212" x2="468" y2="212" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="440" y1="219" x2="458" y2="219" stroke="#94a3b8" stroke-width="1.3" opacity="0.45"/>
  <text x="454" y="260" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">Prompt Builder</text>
  <text x="454" y="272" font-family="monospace" font-size="7.5" fill="#555555" text-anchor="middle">formats context</text>

  <!-- Ollama LLM (618, 208) -->
  <circle cx="618" cy="208" r="38" fill="#0d0d1c" stroke="#6366f1" stroke-width="1.6"/>
  <!-- concentric circles (neural) -->
  <circle cx="618" cy="202" r="14" fill="none" stroke="#6366f1" stroke-width="1.3"/>
  <circle cx="618" cy="202" r="7"  fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
  <circle cx="618" cy="202" r="3"  fill="#6366f1" opacity="0.4"/>
  <!-- radiant spokes -->
  <line x1="618" y1="185" x2="618" y2="181" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="189" x2="633" y2="186" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="632" y1="202" x2="636" y2="202" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="215" x2="633" y2="218" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="606" y1="215" x2="603" y2="218" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="604" y1="202" x2="600" y2="202" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="606" y1="189" x2="603" y2="186" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="618" y="260" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">Ollama</text>
  <text x="618" y="272" font-family="monospace" font-size="7.5" fill="#555555" text-anchor="middle">llama3.2</text>

  <!-- React UI / Report (390, 358) -->
  <circle cx="390" cy="358" r="38" fill="#060f1c" stroke="#2563eb" stroke-width="1.6"/>
  <!-- markdown document icon -->
  <rect x="377" y="344" width="26" height="30" rx="2" fill="none" stroke="#2563eb" stroke-width="1.3"/>
  <line x1="381" y1="352" x2="399" y2="352" stroke="#2563eb" stroke-width="1" opacity="0.7"/>
  <line x1="381" y1="358" x2="399" y2="358" stroke="#2563eb" stroke-width="1" opacity="0.7"/>
  <line x1="381" y1="364" x2="392" y2="364" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <!-- M# symbol for markdown -->
  <text x="390" y="344" font-family="monospace" font-size="7" fill="#2563eb" text-anchor="middle" opacity="0.6">MD</text>
  <text x="390" y="410" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">React UI</text>
  <text x="390" y="422" font-family="monospace" font-size="7.5" fill="#555555" text-anchor="middle">react-markdown</text>

  <!-- ── LEGEND (bottom-right) ── -->
  <text x="700" y="370" font-family="monospace" font-size="8" fill="#333" text-anchor="middle">STACK</text>
  <text x="700" y="385" font-family="monospace" font-size="7.5" fill="#444" text-anchor="middle">React · Vite · TypeScript</text>
  <text x="700" y="398" font-family="monospace" font-size="7.5" fill="#444" text-anchor="middle">Ollama · DuckDuckGo</text>
  <text x="700" y="411" font-family="monospace" font-size="7.5" fill="#444" text-anchor="middle">No API keys · 100% local</text>
</svg>
