  <!-- Note content -->
  <text x="186" y="97" font-family="Georgia, serif" font-size="15" fill="#d0d0d0" font-style="italic">Chapter 3: Derivatives</text>
  <text x="186" y="117" font-family="Georgia, serif" font-size="12" fill="#888" font-style="italic">Definition: The derivative f'(x) measures the</text>
  <text x="186" y="135" font-family="Georgia, serif" font-size="12" fill="#888" font-style="italic">instantaneous rate of change of f(x)</text>
  <text x="186" y="157" font-family="monospace" font-size="13" fill="#c0c0c0">f'(x) = lim   f(x+h) - f(x)</text>
  <text x="186" y="173" font-family="monospace" font-size="11" fill="#555">        h→0  _______________</text>
  <text x="186" y="191" font-family="monospace" font-size="13" fill="#666">                    h</text>
  <text x="186" y="211" font-family="Georgia, serif" font-size="12" fill="#888" font-style="italic">Power Rule: d/dx [xⁿ] = n·xⁿ⁻¹</text>
  <rect x="184" y="220" width="228" height="16" rx="2" fill="#4278FF" opacity="0.12"/>
  <text x="186" y="232" font-family="Georgia, serif" font-size="12" fill="#90aeff" font-style="italic">Chain Rule: d/dx [f(g(x))] = f'(g(x))·g'(x)</text>
  <text x="186" y="252" font-family="Georgia, serif" font-size="12" fill="#888" font-style="italic">Examples:</text>
  <text x="186" y="270" font-family="monospace" font-size="12" fill="#c0c0c0">  d/dx [x²] = 2x</text>
  <text x="186" y="288" font-family="monospace" font-size="12" fill="#c0c0c0">  d/dx [sin x] = cos x</text>
  <text x="186" y="306" font-family="monospace" font-size="12" fill="#c0c0c0">  d/dx [eˣ] = eˣ</text>
  <line x1="186" y1="320" x2="192" y2="333" stroke="#4278FF" stroke-width="1.5" opacity="0.8"/>

